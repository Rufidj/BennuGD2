name: Compilar BennuGD2 en Windows

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v2

      - name: Instalar MSYS2
        run: |
          choco install -y msys2
          C:\tools\msys64\usr\bin\bash.exe -lc "pacman -Syu --noconfirm"
          C:\tools\msys64\usr\bin\bash.exe -lc "pacman -S --noconfirm base-devel mingw-w64-x86_64-gcc mingw-w64-x86_64-SDL2 mingw-w64-x86_64-pkg-config mingw-w64-x86_64-cmake"

      - name: Compilar BennuGD2
        run: |
          C:\tools\msys64\usr\bin\bash.exe -lc "cd core && make -j$(nproc)"

      - name: Verificar compilación
        run: C:\tools\msys64\usr\bin\bash.exe -lc "./bgdi --version"
