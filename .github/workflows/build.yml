name: Build for Ubuntu

on:
  push:
    branches:
      - main  # Cambia esto si deseas que el workflow se ejecute en otra rama
  workflow_dispatch:  # Permite la ejecución manual del flujo de trabajo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install MinGW-w64 and SDL2 dependencies
        run: |
          sudo apt update
          sudo apt install -y mingw-w64 libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libtheora-dev libvorbis-dev

      - name: Clone BennuGD2 repository
        run: |
          git clone https://github.com/SplinterGU/BennuGD2.git
          cd BennuGD2/
          git submodule update --init --recursive

      - name: Build SDL GPU
        run: |
          cd BennuGD2/vendor
          ./build-sdl-gpu.sh linux clean

      - name: Build BennuGD2
        run: |
          cd BennuGD2
          ./build.sh linux clean

      - name: Create index.md
        run: |
          echo '# Lista de Archivos' > index.md
          echo 'Bienvenido a la página de descargas de BennuGD2. A continuación se muestra una lista de los archivos disponibles:' >> index.md
          echo '## Archivos Generados' >> index.md
          for file in BennuGD2/build/linux-gnu/bin/*; do
            echo "- [$(basename $file)]($file)" >> index.md
          done
          echo '## Instrucciones' >> index.md
          echo '1. Haz clic en los enlaces de arriba para descargar los archivos.' >> index.md
          echo '2. Si tienes alguna pregunta, no dudes en abrir un issue en el [repositorio de GitHub](https://github.com/Rufidj/Rufidj.github.io).' >> index.md
          echo '---' >> index.md
          echo '*Última actualización: $(date +%Y-%m-%d)*' >> index.md

      - name: List files in bin
        run: |
          cd BennuGD2
          cd build
          ls -R

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: BennuGD2-GNU-Linux
          path: BennuGD2/build/linux-gnu/bin/**  # Ajusta esta ruta según dónde se encuentren tus artefactos generados

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: BennuGD2/build/linux-gnu/bin  # Ajusta esta ruta según dónde se encuentren tus artefactos generados
          publish_branch: gh-pages  # Cambia esto si necesitas publicar en otra rama
