name: Build BennuGD2

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Permite la ejecución manual del flujo de trabajo

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: |
            git
            patch
            cmake
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-emacs
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-libogg
            mingw-w64-x86_64-libvorbis
            mingw-w64-x86_64-libtheora
            mingw-w64-x86_64-libmodplug
            mingw-w64-x86_64-libmikmod
            mingw-w64-x86_64-libtre-git
            mingw-w64-x86_64-flac
            mingw-w64-x86_64-openal
            mingw-w64-x86_64-libxml2
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-libwebp

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update submodules
        run: git submodule update --init --recursive

      - name: Install SDL2 with CMake Support
        run: |
          bash -lc "pacman -Syu --noconfirm && \
                    pacman -S --noconfirm mingw-w64-x86_64-SDL2 mingw-w64-x86_64-SDL2_image mingw-w64-x86_64-SDL2_mixer mingw-w64-x86_64-SDL2-devel"
      
      - name: Set up CMake with MinGW
        run: |
          bash -lc "cmake -G 'MinGW Makefiles' \
            -DZLIB_LIBRARY=/mingw64/lib/libz.a \
            -DZLIB_INCLUDE_DIR=/mingw64/include \
            -DSDL2_DIR=/mingw64/lib/cmake/SDL2 \
            -DCMAKE_PREFIX_PATH=/mingw64"

      - name: Build SDL_gpu
        run: |
          bash -lc "cd vendor && ./build-sdl-gpu.sh windows"

      - name: Build BennuGD2
        run: |
          bash -lc "./build.sh windows"

      - name: List files in build directory
        run: |
          bash -lc "ls -R build/x86_64-w64-mingw32"

      # Guardar los artefactos
      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: build/x86_64-w64-mingw32 # Ajusta esta ruta según sea necesario







