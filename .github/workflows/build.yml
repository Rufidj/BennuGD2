name: Build BennuGD2

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Permite la ejecución manual del flujo de trabajo

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: |
            git
            patch
            cmake
            mingw-w64-x86_64-toolchain

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update submodules
        run: git submodule update --init --recursive

      - name: Create Build Script
        run: |
          echo "#!/bin/bash" > build_script.sh
          echo "pacman -Syu --noconfirm" >> build_script.sh
          echo "pacman -S --noconfirm mingw-w64-x86_64-SDL2 mingw-w64-x86_64-SDL2_image mingw-w64-x86_64-SDL2_mixer mingw-w64-x86_64-zlib mingw-w64-x86_64-libpng" >> build_script.sh
          echo "cmake -S . -B build -G 'MinGW Makefiles' -DZLIB_LIBRARY=/mingw64/lib/libz.a -DZLIB_INCLUDE_DIR=/mingw64/include -DSDL2_DIR=/mingw64/lib/cmake/SDL2 -DCMAKE_PREFIX_PATH=/mingw64" >> build_script.sh
          echo "cmake --build build --config Release" >> build_script.sh
          chmod +x build_script.sh

      - name: Run Build Script
        run: |
          C:/msys64/usr/bin/bash.exe ./build_script.sh
        shell: msys2

      - name: List files in build directory
        run: |
          C:/msys64/mingw64/bin/bash.exe -c "ls -R build"

      # Guardar los artefactos
      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: build # Ajusta esta ruta según sea necesario











