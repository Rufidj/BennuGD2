name: Build for Ubuntu

on:
  push:
    branches:
      - main  # Cambia esto si deseas que el workflow se ejecute en otra rama
  workflow_dispatch:  # Permite la ejecución manual del flujo de trabajo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install MinGW-w64 and SDL2 dependencies
        run: |
          sudo apt update
          sudo apt install -y mingw-w64 libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libtheora-dev libvorbis-dev

      - name: Clone BennuGD2 repository
        run: |
          git clone https://github.com/SplinterGU/BennuGD2.git
          cd BennuGD2/
          git submodule update --init --recursive

      - name: Build SDL GPU
        run: |
          cd BennuGD2/vendor
          ./build-sdl-gpu.sh linux clean

      - name: Build BennuGD2
        run: |
          cd BennuGD2
          ./build.sh linux clean

      - name: List files in bin
        run: |
          cd BennuGD2
          cd build
          ls -R

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: v2.0.0  # Cambia esto a la versión deseada, puedes usar `${{ github.sha }}` para un tag con el SHA
          release_name: Release v2.0.0  # Cambia esto según tu versión
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: BennuGD2/build/linux-gnu/bin/**  # Ruta a los artefactos generados
          asset_name: ${{ github.run_id }}.zip  # Nombre del archivo que se subirá
          asset_content_type: application/zip
