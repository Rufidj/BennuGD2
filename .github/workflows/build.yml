name: Compilar BennuGD2 en Windows

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:  # Permite ejecución manual

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v2

      - name: Instalar MSYS2 y dependencias
        run: |
          choco install -y msys2
          refreshenv
          msys2 -c "pacman -Syu --noconfirm"
          msys2 -c "pacman -S --noconfirm base-devel mingw-w64-x86_64-gcc mingw-w64-x86_64-SDL2 mingw-w64-x86_64-pkg-config mingw-w64-x86_64-cmake"

      - name: Compilar BennuGD2
        run: |
          msys2 -c "cd core && make -j$(nproc)"

      - name: Verificar compilación
        run: msys2 -c "./bgdi --version"
