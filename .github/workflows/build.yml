name: Build BennuGD2

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Permite la ejecución manual del flujo de trabajo

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: |
            git
            patch
            cmake
            mingw-w64-x86_64-toolchain  # Asegúrate de que la toolchain de MinGW esté instalada
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_image
            mingw-w64-x86_64-SDL2_mixer
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-zlib  # Asegúrate de que ZLIB esté instalado
            mingw-w64-x86_64-libogg
            mingw-w64-x86_64-libvorbis
            mingw-w64-x86_64-libtheora
            mingw-w64-x86_64-libmodplug
            mingw-w64-x86_64-libmikmod
            mingw-w64-x86_64-libtre-git
            mingw-w64-x86_64-flac
            mingw-w64-x86_64-openal
            mingw-w64-x86_64-libxml2
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-libwebp

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update submodules
        run: git submodule update --init --recursive

      - name: Build SDL_gpu
        run: |
          cd vendor
          ./build-sdl-gpu.sh windows
        shell: bash  # Asegúrate de usar Bash para ejecutar el script

      - name: Set up environment for MinGW
        run: |
          echo "Adding MinGW to PATH"
          echo "C:/msys64/mingw64/bin" >> $GITHUB_ENV

      - name: Build BennuGD2
        run: |
          cmake -S . -B build -G "MinGW Makefiles" -DZLIB_LIBRARY=C:/msys64/mingw64/lib/libz.a -DZLIB_INCLUDE_DIR=C:/msys64/mingw64/include && cmake --build build
        shell: bash  # Asegúrate de usar Bash para la construcción

      - name: List files in build directory
        run: |
          ls -R build/x86_64-w64-mingw32
        shell: bash  # Asegúrate de usar Bash para listar archivos

      # Guardar los artefactos
      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: build/x86_64-w64-mingw32 # Ajusta esta ruta según sea necesario
