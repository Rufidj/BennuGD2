name: Build and Release BennuGD2 Packages

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-linux32:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up environment for linux32
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y gcc-multilib g++-multilib binutils git cmake build-essential zlib1g-dev:i386 libsdl2-dev:i386 libglu1-mesa-dev:i386 libsdl2-image-dev:i386 libsdl2-mixer-dev:i386 libtheora-dev:i386 libogg-dev:i386 libvorbis-dev:i386 wget

      - name: Build GLEW from source (linux32)
        run: |
          wget -nc https://sourceforge.net/projects/glew/files/glew/2.2.0/glew-2.2.0.tgz
          tar -xzf glew-2.2.0.tgz
          cd glew-2.2.0
          make SYSTEM=linux CC=gcc CFLAGS="-m32 -O2" LDFLAGS="-m32"
          cd ..

      - name: Update submodules and Build
        run: |
          export C_INCLUDE_PATH=$PWD/glew-2.2.0/include:$C_INCLUDE_PATH
          export CPLUS_INCLUDE_PATH=$PWD/glew-2.2.0/include:$CPLUS_INCLUDE_PATH
          export LD_LIBRARY_PATH=$PWD/glew-2.2.0/lib:$LD_LIBRARY_PATH
          git submodule update --init --recursive
          cd vendor
          ./build-sdl-gpu.sh linux32
          cd ..
          ./build.sh linux32
          ./build.sh packages

      - name: Upload BennuGD2 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BennuGD2-linux32
          path: packages/bgd2-*.tgz

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up environment for linux
        run: |
          sudo apt update
          sudo apt install -y binutils git cmake build-essential zlib1g-dev libsdl2-dev libglu1-mesa-dev libsdl2-image-dev libsdl2-mixer-dev libtheora-dev libogg-dev libvorbis-dev wget

      - name: Build GLEW from source (linux)
        run: |
          wget -nc https://sourceforge.net/projects/glew/files/glew/2.2.0/glew-2.2.0.tgz
          tar -xzf glew-2.2.0.tgz
          cd glew-2.2.0
          make SYSTEM=linux CC=gcc CFLAGS="-O2" LDFLAGS=""
          cd ..

      - name: Update submodules and Build
        run: |
          export C_INCLUDE_PATH=$PWD/glew-2.2.0/include:$C_INCLUDE_PATH
          export CPLUS_INCLUDE_PATH=$PWD/glew-2.2.0/include:$CPLUS_INCLUDE_PATH
          export LD_LIBRARY_PATH=$PWD/glew-2.2.0/lib:$LD_LIBRARY_PATH
          git submodule update --init --recursive
          cd vendor
          ./build-sdl-gpu.sh linux
          cd ..
          ./build.sh linux
          ./build.sh packages

      - name: Upload BennuGD2 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BennuGD2-linux
          path: packages/bgd2-*.tgz

  build-windows:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up environment
        run: |
          sudo apt update
          sudo apt install -y mingw-w64 build-essential cmake autoconf libtool pkg-config rar wget

      - name: Build GLEW from source (windows 64-bit)
        run: |
          wget -nc https://sourceforge.net/projects/glew/files/glew/2.2.0/glew-2.2.0.tgz
          tar -xzf glew-2.2.0.tgz
          cd glew-2.2.0
          make SYSTEM=mingw64 CC=x86_64-w64-mingw32-gcc
          cd ..

      - name: Update submodules and Build
        run: |
          export C_INCLUDE_PATH=$PWD/glew-2.2.0/include:$C_INCLUDE_PATH
          export CPLUS_INCLUDE_PATH=$PWD/glew-2.2.0/include:$CPLUS_INCLUDE_PATH
          git submodule update --init --recursive
          cd vendor
          ./build-sdl-gpu.sh windows
          cd ..
          ./build.sh windows
          mkdir -p packages 2>/dev/null
          rm -f packages/*
          if [[ -d build/x86_64-w64-mingw32/bin ]]; then \
            rar a -ep1 packages/bgd2-x86_64-w64-mingw32-$(date +"%Y-%m-%d").rar \
              build/x86_64-w64-mingw32/bin/*.exe \
              build/x86_64-w64-mingw32/bin/*.dll \
              dependencies/x86_64-w64-mingw32/libSDL2_gpu.dll \
              $(find /usr/x86_64-w64-mingw32 -name '*.dll') \
              WhatsNew.txt; \
          fi

      - name: Upload BennuGD2 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BennuGD2-windows
          path: packages/bgd2-x86_64-w64-mingw32-*.rar

  build-windows-32bit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up environment
        run: |
          sudo apt update
          sudo apt install -y mingw-w64 build-essential cmake autoconf libtool pkg-config rar wget

      - name: Build GLEW from source (windows 32-bit)
        run: |
          wget -nc https://sourceforge.net/projects/glew/files/glew/2.2.0/glew-2.2.0.tgz
          tar -xzf glew-2.2.0.tgz
          cd glew-2.2.0
          make SYSTEM=mingw CC=i686-w64-mingw32-gcc
          cd ..

      - name: Update submodules and Build
        run: |
          export C_INCLUDE_PATH=$PWD/glew-2.2.0/include:$C_INCLUDE_PATH
          export CPLUS_INCLUDE_PATH=$PWD/glew-2.2.0/include:$CPLUS_INCLUDE_PATH
          git submodule update --init --recursive
          cd vendor
          ./build-sdl-gpu.sh windows32
          cd ..
          ./build.sh windows32
          mkdir -p packages 2>/dev/null
          rm -f packages/*
          if [[ -d build/i686-w64-mingw32/bin ]]; then \
            rar a -ep1 packages/bgd2-i686-w64-mingw32-$(date +"%Y-%m-%d").rar \
              build/i686-w64-mingw32/bin/*.exe \
              build/i686-w64-mingw32/bin/*.dll \
              dependencies/i686-w64-mingw32/libSDL2_gpu.dll \
              $(find /usr/i686-w64-mingw32 -name '*.dll') \
              WhatsNew.txt; \
          fi

      - name: Upload BennuGD2 artifacts for 32-bit
        uses: actions/upload-artifact@v4
        with:
          name: BennuGD2-windows32
          path: packages/bgd2-i686-w64-mingw32-*.rar

  build-macosx:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up osxcross
        run: |
          sudo apt update
          sudo apt install -y wget git cmake clang pkg-config tar xz-utils gobjc gobjc++ libobjc-9-dev openssl
          mkdir -p /opt
          cd /opt
          git clone https://github.com/tpoechtrager/osxcross.git
          cd osxcross
          wget -nc https://github.com/joseluisq/macosx-sdks/releases/download/10.10/MacOSX10.10.sdk.tar.xz
          mv MacOSX10.10.sdk.tar.xz tarballs/
          sudo ./tools/get_dependencies.sh
          UNATTENDED=yes ./build.sh

      - name: Install dependencies
        run: |
          sudo mkdir -p /opt/osxcross/target/macports/
          sudo echo "http://www.mirrorservice.org/sites/packages.macports.org" > /opt/osxcross/target/macports/MIRROR
          sudo sed -i '/^verifyFileIntegrity()/,/^}/cverifyFileIntegrity() {\n  local file="$1"\n  echo "Skipping integrity check for $file. Returning success."\n  return 0\n}' /opt/osxcross/target/bin/osxcross-macports
          sudo UNATTENDED=yes OSX_VERSION_MIN=10.7 PATH=/opt/osxcross/target/bin:$PATH SDKROOT=/opt/osxcross/target/SDK/MacOSX10.10.sdk MACOSX_DEPLOYMENT_TARGET=10.10 /opt/osxcross/target/bin/osxcross-macports -v install libtheora libsdl2 libsdl2_image libsdl2_mixer

      - name: Build GLEW from source (macosx)
        run: |
          wget -nc https://sourceforge.net/projects/glew/files/glew/2.2.0/glew-2.2.0.tgz
          tar -xzf glew-2.2.0.tgz
          cd glew-2.2.0
          make SYSTEM=darwin CC=o64-clang
          cd ..

      - name: Update submodules and Build
        run: |
          export PATH=/opt/osxcross/target/bin:$PATH
          export SDKROOT=/opt/osxcross/target/SDK/MacOSX10.10.sdk
          export MACOSX_DEPLOYMENT_TARGET=10.10
          export C_INCLUDE_PATH=$PWD/glew-2.2.0/include:$C_INCLUDE_PATH
          export CPLUS_INCLUDE_PATH=$PWD/glew-2.2.0/include:$CPLUS_INCLUDE_PATH
          git submodule update --init --recursive
          cd vendor
          ./build-sdl-gpu.sh macosx
          cd ..
          ./build.sh macosx
          ./build.sh packages

      - name: Upload BennuGD2 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BennuGD2-macosx
          path: packages/x86_64-apple-darwin14-*.tgz

  create-release:
    needs: [build-linux32, build-linux, build-windows, build-windows-32bit, build-macosx]
    runs-on: ubuntu-latest
    if: success()

    strategy:
      matrix:
        platform:
          - linux
          - linux32
          - windows
          - windows32
          - macosx

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download BennuGD2 Artifacts
        uses: actions/download-artifact@v4
        with:
          name: BennuGD2-${{ matrix.platform }}
          path: ./dist/${{ matrix.platform }}

      - name: Upload BennuGD2 Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/${{ matrix.platform }}/*
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
