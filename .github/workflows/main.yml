name: Build and Release BennuGD2 Packages

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-linux32:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v3
        with:
          path: /var/cache/apt
          key: ${{ runner.os }}-apt-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Set up environment for linux32
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y gcc-multilib g++-multilib binutils git cmake build-essential \
            zlib1g-dev:i386 libsdl2-dev:i386 libglu1-mesa-dev:i386 \
            libsdl2-image-dev:i386 libsdl2-mixer-dev:i386 libtheora-dev:i386 \
            libogg-dev:i386 libvorbis-dev:i386

      - name: Build GLEW 32-bit
        run: |
          wget -nc https://sourceforge.net/projects/glew/files/glew/2.2.0/glew-2.2.0.tgz
          tar -xzf glew-2.2.0.tgz
          cd glew-2.2.0
          make SYSTEM=linux CC=gcc CFLAGS="-m32" LDFLAGS="-m32"
          sudo make SYSTEM=linux install
          cd ..

      - name: Update submodules and Build
        run: |
          git submodule update --init --recursive
          cd vendor
          ./build-sdl-gpu.sh linux32
          cd ..
          ./build.sh linux32
          ./build.sh packages

      - name: Upload BennuGD2 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BennuGD2-linux32
          path: packages/bgd2-*.tgz

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up environment for linux
        run: |
          sudo apt update
          sudo apt install -y binutils git cmake build-essential zlib1g-dev \
            libsdl2-dev libglu1-mesa-dev libsdl2-image-dev libsdl2-mixer-dev \
            libtheora-dev libogg-dev libvorbis-dev libglew-dev

      - name: Update submodules and Build
        run: |
          git submodule update --init --recursive
          cd vendor
          ./build-sdl-gpu.sh linux
          cd ..
          ./build.sh linux
          ./build.sh packages

      - name: Upload BennuGD2 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BennuGD2-linux
          path: packages/bgd2-*.tgz          

  build-windows:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up environment for mingw
        run: |
          sudo apt update
          sudo apt install -y mingw-w64 build-essential cmake autoconf libtool pkg-config rar \
            libz-mingw-w64-dev

      - name: Build GLEW for Windows 64-bit
        run: |
          wget -nc https://sourceforge.net/projects/glew/files/glew/2.2.0/glew-2.2.0.tgz
          tar -xzf glew-2.2.0.tgz
          cd glew-2.2.0
          mkdir build && cd build
          cmake -G "Unix Makefiles" -DCMAKE_SYSTEM_NAME=Windows -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc ..
          make
          cp lib/libGLEW.a /usr/x86_64-w64-mingw32/lib/
          cp include/GL/glew.h /usr/x86_64-w64-mingw32/include/GL/
          cd ../..

      - name: Build dependencies
        run: |
          cd vendor
          ./build-sdl-gpu.sh windows
          cd ..
          ./build.sh windows
          mkdir -p packages
          rm -f packages/*
          if [[ -d build/x86_64-w64-mingw32/bin ]]; then \
            rar a -ep1 packages/bgd2-x86_64-w64-mingw32-$(date +"%Y-%m-%d").rar \
                        build/x86_64-w64-mingw32/bin/*.exe \
                        build/x86_64-w64-mingw32/bin/*.dll \
                        dependencies/x86_64-w64-mingw32/libSDL2_gpu.dll \
                        /usr/x86_64-w64-mingw32/bin/libogg*.dll \
                        /usr/x86_64-w64-mingw32/bin/libvorbis*.dll \
                        /usr/x86_64-w64-mingw32/bin/SDL2.dll \
                        /usr/x86_64-w64-mingw32/bin/SDL2_image.dll \
                        /usr/x86_64-w64-mingw32/bin/SDL2_mixer.dll \
                        $(find /usr/x86_64-w64-mingw32 -name 'zlib1.dll') \
                        /usr/x86_64-w64-mingw32/lib/libwinpthread-*.dll \
                        WhatsNew.txt; \
          fi

      - name: Upload BennuGD2 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BennuGD2-windows
          path: packages/bgd2-x86_64-w64-mingw32-*.rar

  build-windows-32bit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up environment
        run: |
          sudo apt update
          sudo apt install -y mingw-w64 build-essential cmake autoconf libtool pkg-config rar \
            libz-mingw-w64-dev

      - name: Build GLEW for Windows 32-bit
        run: |
          wget -nc https://sourceforge.net/projects/glew/files/glew/2.2.0/glew-2.2.0.tgz
          tar -xzf glew-2.2.0.tgz
          cd glew-2.2.0
          mkdir build && cd build
          cmake -G "Unix Makefiles" -DCMAKE_SYSTEM_NAME=Windows -DCMAKE_C_COMPILER=i686-w64-mingw32-gcc ..
          make
          cp lib/libGLEW.a /usr/i686-w64-mingw32/lib/
          cp include/GL/glew.h /usr/i686-w64-mingw32/include/GL/
          cd ../..

      - name: Build dependencies and package
        run: |
          git submodule update --init --recursive
          cd vendor
          ./build-sdl-gpu.sh windows32
          cd ..
          ./build.sh windows32
          mkdir -p packages
          rm -f packages/*
          if [[ -d build/i686-w64-mingw32/bin ]]; then \
            rar a -ep1 packages/bgd2-i686-w64-mingw32-$(date +"%Y-%m-%d").rar \
                        build/i686-w64-mingw32/bin/*.exe \
                        build/i686-w64-mingw32/bin/*.dll \
                        dependencies/i686-w64-mingw32/libSDL2_gpu.dll \
                        /usr/i686-w64-mingw32/bin/libogg*.dll \
                        /usr/i686-w64-mingw32/bin/libvorbis*.dll \
                        /usr/i686-w64-mingw32/bin/SDL2.dll \
                        /usr/i686-w64-mingw32/bin/SDL2_image.dll \
                        /usr/i686-w64-mingw32/bin/SDL2_mixer.dll \
                        $(find /usr/i686-w64-mingw32 -name 'zlib1.dll') \
                        /usr/i686-w64-mingw32/lib/libwinpthread-*.dll \
                        WhatsNew.txt; \
          fi

      - name: Upload BennuGD2 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BennuGD2-windows32
          path: packages/bgd2-i686-w64-mingw32-*.rar

  build-macosx:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up osxcross
        run: |
          sudo apt update
          sudo apt install -y wget git cmake clang pkg-config tar xz-utils gobjc gobjc++ libobjc-9-dev openssl
          mkdir -p /opt
          cd /opt
          git clone https://github.com/tpoechtrager/osxcross.git
          cd osxcross
          wget -nc https://github.com/joseluisq/macosx-sdks/releases/download/10.10/MacOSX10.10.sdk.tar.xz
          mv MacOSX10.10.sdk.tar.xz tarballs/
          sudo ./tools/get_dependencies.sh
          UNATTENDED=yes ./build.sh

      - name: Build GLEW for macOS
        run: |
          export OSX_VERSION_MIN=10.7
          export PATH=/opt/osxcross/target/bin:$PATH
          export SDKROOT=/opt/osxcross/target/SDK/MacOSX10.10.sdk
          cd /tmp
          wget -nc https://sourceforge.net/projects/glew/files/glew/2.2.0/glew-2.2.0.tgz
          tar -xzf glew-2.2.0.tgz
          cd glew-2.2.0
          make SYSTEM=darwin CC=o64-clang
          sudo make SYSTEM=darwin CC=o64-clang install

      - name: Update submodules and Build
        run: |
          export OSX_VERSION_MIN=10.7
          export PATH=/opt/osxcross/target/bin:$PATH
          export SDKROOT=/opt/osxcross/target/SDK/MacOSX10.10.sdk
          export MACOSX_DEPLOYMENT_TARGET=10.10
          git submodule update --init --recursive
          cd vendor
          ./build-sdl-gpu.sh macosx
          cd ..
          ./build.sh macosx
          ./build.sh packages

      - name: Upload BennuGD2 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BennuGD2-macosx
          path: packages/x86_64-apple-darwin14-*.tgz

  create-release:
    needs: [build-linux32, build-linux, build-windows, build-windows-32bit, build-macosx]
    runs-on: ubuntu-latest
    if: success()
    strategy:
      matrix:
        platform:
          - linux
          - linux32
          - windows
          - windows32
          - macosx

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download BennuGD2 Artifacts
        uses: actions/download-artifact@v4
        with:
          name: BennuGD2-${{ matrix.platform }}
          path: ./dist/${{ matrix.platform }}

      - name: Upload BennuGD2 Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/${{ matrix.platform }}/*
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
