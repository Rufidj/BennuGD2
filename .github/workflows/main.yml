name: Build and Release BennuGD2 Packages

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:

# ================================================================
# LINUX 32-bit
# ================================================================
  build-linux32:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Linux32 deps
        uses: actions/cache@v4
        with:
          path: |
            /usr/lib/i386-linux-gnu
            /usr/include
            vendor
          key: linux32-${{ hashFiles('vendor/**') }}

      - name: Install ALL dependencies for Linux32 (GL + GLEW)
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y \
            gcc-multilib g++-multilib binutils git cmake build-essential \
            zlib1g-dev:i386 \
            libsdl2-dev:i386 \
            libsdl2-image-dev:i386 \
            libsdl2-mixer-dev:i386 \
            libtheora-dev:i386 \
            libogg-dev:i386 \
            libvorbis-dev:i386 \
            libglu1-mesa-dev:i386 \
            libgl1-mesa-dev:i386 \
            mesa-common-dev:i386 \
            libglew-dev:i386 \
            glew-utils:i386

      - name: Update submodules and Build
        run: |
          git submodule update --init --recursive
          cd vendor
          ./build-sdl-gpu.sh linux32
          cd ..
          ./build.sh linux32
          ./build.sh packages

      - name: Upload Linux32 package
        uses: actions/upload-artifact@v4
        with:
          name: BennuGD2-linux32
          path: packages/bgd2-*.tgz

# ================================================================
# LINUX 64-bit
# ================================================================
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Linux64 deps
        uses: actions/cache@v4
        with:
          path: |
            /usr/lib
            /usr/include
            vendor
          key: linux64-${{ hashFiles('vendor/**') }}

      - name: Install ALL dependencies for Linux64 (GL + GLEW)
        run: |
          sudo apt update
          sudo apt install -y \
            binutils git cmake build-essential \
            zlib1g-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libtheora-dev \
            libogg-dev \
            libvorbis-dev \
            libglu1-mesa-dev \
            libgl1-mesa-dev \
            mesa-common-dev \
            libglew-dev \
            glew-utils

      - name: Update submodules and Build
        run: |
          git submodule update --init --recursive
          cd vendor
          ./build-sdl-gpu.sh linux
          cd ..
          ./build.sh linux
          ./build.sh packages

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: BennuGD2-linux
          path: packages/bgd2-*.tgz

# ================================================================
# WINDOWS 64-bit
# ================================================================
  build-windows:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Windows64 deps
        uses: actions/cache@v4
        with:
          path: |
            /usr/x86_64-w64-mingw32
            vendor
          key: win64-${{ hashFiles('vendor/**') }}

      - name: Install Windows build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            mingw-w64 build-essential cmake autoconf libtool pkg-config rar \
            libz-mingw-w64-dev

      - name: Build SDL, OGG, Vorbis, Theora, GLEW
        run: |
          cd vendor
          # SDL2
          cd SDL2-2.28.4
          sed -i 's,/usr/local,/usr,g' Makefile
          sudo make cross
          cd ..

          # SDL_mixer
          cd SDL2_mixer-2.6.3
          sed -i 's,/usr/local,/usr,g' Makefile
          sudo make cross
          cd ..

          # SDL_image
          cd SDL2_image-2.6.3
          sed -i 's,/usr/local,/usr,g' Makefile
          sudo make cross
          cd ..

          # OGG
          wget -nc https://downloads.xiph.org/releases/ogg/libogg-1.3.5.tar.gz
          tar -xf libogg-1.3.5.tar.gz
          cd libogg-1.3.5
          ./configure --host=x86_64-w64-mingw32 --prefix=/usr/x86_64-w64-mingw32
          make && sudo make install
          cd ..

          # Vorbis
          wget -nc https://downloads.xiph.org/releases/vorbis/libvorbis-1.3.7.tar.gz
          tar -xf libvorbis-1.3.7.tar.gz
          cd libvorbis-1.3.7
          ./configure --host=x86_64-w64-mingw32 --prefix=/usr/x86_64-w64-mingw32
          make && sudo make install
          cd ..

          # Theora
          wget -nc http://downloads.xiph.org/releases/theora/libtheora-1.1.1.tar.gz
          tar -xf libtheora-1.1.1.tar.gz
          cd libtheora-1.1.1
          ./configure --host=x86_64-w64-mingw32 --prefix=/usr/x86_64-w64-mingw32 --disable-shared --disable-examples
          make && sudo make install
          cd ..

          # GLEW
          wget -nc https://sourceforge.net/projects/glew/files/glew/2.2.0/glew-2.2.0.tgz
          tar -xf glew-2.2.0.tgz
          cd glew-2.2.0
          make SYSTEM=mingw-w64 CC=x86_64-w64-mingw32-gcc
          sudo make SYSTEM=mingw-w64 CC=x86_64-w64-mingw32-gcc install GLEW_DEST=/usr/x86_64-w64-mingw32
          cd ../..

      - name: Build BennuGD2 Windows
        run: |
          git submodule update --init --recursive
          cd vendor
          ./build-sdl-gpu.sh windows
          cd ..
          ./build.sh windows

          mkdir -p packages
          rm -f packages/*

          rar a -ep1 packages/bgd2-x86_64-w64-mingw32-$(date +"%Y-%m-%d").rar \
            build/x86_64-w64-mingw32/bin/*.exe \
            build/x86_64-w64-mingw32/bin/*.dll \
            dependencies/x86_64-w64-mingw32/libSDL2_gpu.dll \
            /usr/x86_64-w64-mingw32/bin/*.dll \
            /usr/x86_64-w64-mingw32/lib/libGLEW*.dll \
            WhatsNew.txt

      - name: Upload Windows64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BennuGD2-windows
          path: packages/*.rar

# ================================================================
# WINDOWS 32-bit
# ================================================================
  build-windows-32bit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Windows32 deps
        uses: actions/cache@v4
        with:
          path: |
            /usr/i686-w64-mingw32
            vendor
          key: win32-${{ hashFiles('vendor/**') }}

      - name: Install Windows 32-bit build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            mingw-w64 build-essential cmake autoconf libtool pkg-config rar \
            libz-mingw-w64-dev

      - name: Build SDL, OGG, Vorbis, Theora, GLEW (32-bit)
        run: |
          cd vendor
          cd SDL2-2.28.4
          sed -i 's,/usr/local,/usr,g' Makefile
          sudo make cross
          cd ..

          cd SDL2_mixer-2.6.3
          sed -i 's,/usr/local,/usr,g' Makefile
          sudo make cross
          cd ..

          cd SDL2_image-2.6.3
          sed -i 's,/usr/local,/usr,g' Makefile
          sudo make cross
          cd ..

          wget -nc https://downloads.xiph.org/releases/ogg/libogg-1.3.5.tar.gz
          tar -xf libogg-1.3.5.tar.gz
          cd libogg-1.3.5
          ./configure --host=i686-w64-mingw32 --prefix=/usr/i686-w64-mingw32
          make && sudo make install
          cd ..

          wget -nc https://downloads.xiph.org/releases/vorbis/libvorbis-1.3.7.tar.gz
          tar -xf libvorbis-1.3.7.tar.gz
          cd libvorbis-1.3.7
          ./configure --host=i686-w64-mingw32 --prefix=/usr/i686-w64-mingw32
          make && sudo make install
          cd ..

          wget -nc http://downloads.xiph.org/releases/theora/libtheora-1.1.1.tar.gz
          tar -xf libtheora-1.1.1.tar.gz
          cd libtheora-1.1.1
          ./configure --host=i686-w64-mingw32 --prefix=/usr/i686-w64-mingw32 --disable-shared --disable-examples
          make && sudo make install
          cd ..

          wget -nc https://sourceforge.net/projects/glew/files/glew/2.2.0/glew-2.2.0.tgz
          tar -xf glew-2.2.0.tgz
          cd glew-2.2.0
          make SYSTEM=mingw-w64 CC=i686-w64-mingw32-gcc
          sudo make SYSTEM=mingw-w64 CC=i686-w64-mingw32-gcc install GLEW_DEST=/usr/i686-w64-mingw32
          cd ../..

      - name: Build BennuGD2 Windows 32-bit
        run: |
          git submodule update --init --recursive
          cd vendor
          ./build-sdl-gpu.sh windows32
          cd ..
          ./build.sh windows32

          mkdir -p packages
          rm -f packages/*

          rar a -ep1 packages/bgd2-i686-w64-mingw32-$(date +"%Y-%m-%d").rar \
            build/i686-w64-mingw32/bin/*.exe \
            build/i686-w64-mingw32/bin/*.dll \
            dependencies/i686-w64-mingw32/libSDL2_gpu.dll \
            /usr/i686-w64-mingw32/bin/*.dll \
            /usr/i686-w64-mingw32/lib/libGLEW*.dll \
            WhatsNew.txt

      - name: Upload Windows32 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BennuGD2-windows32
          path: packages/*.rar

# ================================================================
# MACOS (OSXCROSS)
# ================================================================
  build-macosx:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache osxcross
        uses: actions/cache@v4
        with:
          path: /opt/osxcross
          key: osxcross-${{ hashFiles('vendor/**') }}

      - name: Setup osxcross
        run: |
          if [ ! -d /opt/osxcross/target ]; then
            sudo apt update
            sudo apt install -y wget git cmake clang pkg-config tar xz-utils gobjc gobjc++ libobjc-9-dev openssl
            mkdir -p /opt
            cd /opt
            git clone https://github.com/tpoechtrager/osxcross.git
            cd osxcross
            wget -nc https://github.com/joseluisq/macosx-sdks/releases/download/10.10/MacOSX10.10.sdk.tar.xz
            mv MacOSX10.10.sdk.tar.xz tarballs/
            sudo ./tools/get_dependencies.sh
            UNATTENDED=yes ./build.sh
          fi

      - name: Install macOS dependencies (SDL + Theora + GLEW)
        run: |
          sudo mkdir -p /opt/osxcross/target/macports/
          sudo bash -c 'echo "http://www.mirrorservice.org/sites/packages.macports.org" > /opt/osxcross/target/macports/MIRROR'
          sudo sed -i '/^verifyFileIntegrity()/,/^}/cverifyFileIntegrity() { return 0; }' /opt/osxcross/target/bin/osxcross-macports
          UNATTENDED=yes \
            OSX_VERSION_MIN=10.7 \
            PATH=/opt/osxcross/target/bin:$PATH \
            SDKROOT=/opt/osxcross/target/SDK/MacOSX10.10.sdk \
            MACOSX_DEPLOYMENT_TARGET=10.10 \
            /opt/osxcross/target/bin/osxcross-macports -v install \
              libtheora libsdl2 libsdl2_image libsdl2_mixer glew

      - name: Build BennuGD2 macOS
        run: |
          export OSX_VERSION_MIN=10.7
          export PATH=/opt/osxcross/target/bin:$PATH
          export SDKROOT=/opt/osxcross/target/SDK/MacOSX10.10.sdk
          export MACOSX_DEPLOYMENT_TARGET=10.10

          git submodule update --init --recursive
          cd vendor
          ./build-sdl-gpu.sh macosx
          cd ..

          ./build.sh macosx
          ./build.sh packages

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: BennuGD2-macosx
          path: packages/x86_64-apple-darwin14-*.tgz

# ================================================================
# RELEASE JOB
# ================================================================
  create-release:
    needs:
      - build-linux32
      - build-linux
      - build-windows
      - build-windows-32bit
      - build-macosx

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/**/*
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
