name: Manual Build BennuGD2

on:
  workflow_dispatch:  # Este evento permite ejecutar manualmente el flujo de trabajo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Build BennuGD2
      run: |
        chmod +x build.sh  # Asegurarse de que el script tenga permisos de ejecución
        ./build.sh linux use_sdl2       # Ejecutar el script de compilación

