name: Build for Windows

on:
  push:
    branches:
      - main  # Cambia esto si deseas que el workflow se ejecute en otra rama
  workflow_dispatch:  # Permite la ejecución manual del flujo de trabajo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install MinGW-w64 and dependencies
        run: |
          sudo apt update
          sudo apt install -y mingw-w64 libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libtheora-dev libvorbis-dev

      - name: Install SDL2 for MinGW
        run: |
          wget https://libsdl.org/release/SDL2-devel-2.26.5-windows-x64.zip
          unzip SDL2-devel-2.26.5-windows-x64.zip -d $HOME/SDL2
          export CMAKE_PREFIX_PATH=$HOME/SDL2

      - name: Clone BennuGD2 repository
        run: |
          git clone https://github.com/SplinterGU/BennuGD2.git
          cd BennuGD2/
          git submodule update --init --recursive

      - name: Build SDL GPU
        run: |
          cd BennuGD2/vendor
          mkdir build
          cd build
          cmake .. -DCMAKE_PREFIX_PATH=$HOME/SDL2
          make

      - name: Build BennuGD2
        run: |
          cd BennuGD2
          ./build.sh windows clean

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: BennuGD2-artifacts
          path: |
            bin/**  # Ajusta esta ruta según dónde se encuentren tus artefactos generados
