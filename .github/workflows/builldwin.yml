name: Build BennuGD2 for Windows

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Update package lists
        run: sudo apt-get update

      - name: Install required dependencies
        run: |
          sudo apt-get install -y autoconf automake libtool make base-files git
          sudo apt-get install -y mingw-w64

      - name: Install MSYS2
        run: |
          sudo apt-get install -y wget tar
          wget -qO- https://mirror.msys2.org/distrib/x86_64/msys2-base-x86_64-latest.tar.xz | sudo tar -xJ -C /opt
          /opt/msys64/usr/bin/bash -lc "pacman --noconfirm -Syuu"
      
      - name: Install Mingw packages using MSYS2
        run: |
          /opt/msys64/usr/bin/bash -lc "pacman --noconfirm -S \
            mingw-w64-x86_64-SDL2 \
            mingw-w64-x86_64-SDL2_image \
            mingw-w64-x86_64-SDL2_mixer \
            mingw-w64-x86_64-cmake \
            mingw-w64-x86_64-flac \
            mingw-w64-x86_64-freetype \
            mingw-w64-x86_64-gcc \
            mingw-w64-x86_64-libjpeg-turbo \
            mingw-w64-x86_64-libmikmod \
            mingw-w64-x86_64-libmodplug \
            mingw-w64-x86_64-libogg \
            mingw-w64-x86_64-libpng \
            mingw-w64-x86_64-libtheora \
            mingw-w64-x86_64-libvorbis \
            mingw-w64-x86_64-libwebp \
            mingw-w64-x86_64-ninja \
            mingw-w64-x86_64-openal \
            mingw-w64-x86_64-sqlite3"

      - name: Clone BennuGD2 repository
        run: git clone https://github.com/SplinterGU/BennuGD2.git

      - name: Initialize submodules
        run: |
          cd BennuGD2/
          git submodule update --init --recursive

      - name: Build SDL GPU for Windows
        run: |
          cd BennuGD2/vendor
          ./build-sdl-gpu.sh windows

      - name: Build BennuGD2 for Windows
        run: |
          cd BennuGD2/
          ./build.sh windows
