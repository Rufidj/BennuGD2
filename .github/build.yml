name: Build BennuGD2

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Permite la ejecución manual del flujo de trabajo

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: |
            git
            patch
            cmake
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-emacs
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_image
            mingw-w64-x86_64-SDL2_mixer
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-libogg
            mingw-w64-x86_64-libvorbis
            mingw-w64-x86_64-libtheora
            mingw-w64-x86_64-libmodplug
            mingw-w64-x86_64-libmikmod
            mingw-w64-x86_64-libtre-git
            mingw-w64-x86_64-flac
            mingw-w64-x86_64-openal
            mingw-w64-x86_64-libxml2
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-libwebp

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update submodules
        run: git submodule update --init --recursive

      - name: Build SDL_gpu
        run: |
          cd vendor
          ./build-sdl-gpu.sh windows

      - name: Build BennuGD2
        run: |
          ./build.sh windows
          cp dependencies/x86_64-w64-mingw32/* build/x86_64-w64-mingw32/bin/
